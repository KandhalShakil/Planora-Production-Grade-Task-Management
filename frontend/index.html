<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planora – Production-Grade Task Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-check-double logo-icon"></i>
                <span class="logo-text">Planora</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <h3 class="nav-title">Menu</h3>
                    <ul class="nav-list">
                        <li class="nav-item active" data-status="">
                            <i class="fas fa-chart-pie"></i> Dashboard
                        </li>
                        <li class="nav-item" data-status="pending">
                            <i class="fas fa-clock"></i> Pending Tasks
                        </li>
                        <li class="nav-item" data-status="completed">
                            <i class="fas fa-check-circle"></i> Completed Tasks
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <h3 class="nav-title">Filters</h3>
                    <select id="priorityFilter" class="sidebar-select">
                        <option value="">All Priorities</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <div class="nav-section">
                    <h3 class="nav-title">Sort By</h3>
                    <select id="sortSelect" class="sidebar-select">
                        <option value="-createdAt">Newest First</option>
                        <option value="dueDate">Due Date</option>
                        <option value="priority">Priority</option>
                    </select>
                </div>

            </nav>
            <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-arrow-right-from-bracket"></i>
                <span>Log out</span>
            </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="sidebarToggle" class="sidebar-toggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search tasks...">
                    </div>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" id="openAddModal">
                        <i class="fas fa-plus"></i> <span>New Task</span>
                    </button>
                </div>
            </header>

            <div class="dashboard">
                <div class="dashboard-header">
                    <div class="task-stats">
                        <span id="taskCount">0</span> tasks found
                    </div>
                </div>

                <div class="dashboard-content-area">
                    <div id="loader" class="loader-container hidden">
                        <div class="spinner"></div>
                        <p>Synchronizing your tasks...</p>
                    </div>

                    <div id="taskList" class="task-grid">
                    </div>
                    
                    <div id="emptyState" class="empty-state hidden">
                        <div class="empty-state-content">
                            <i class="fas fa-tasks empty-state-icon"></i>
                            <h3 class="empty-state-title">No tasks found</h3>
                            <p class="empty-state-description">Your task list is empty. Create your first task to get started!</p>
                            <button class="btn btn-primary" onclick="document.getElementById('openAddModal').click()">
                                <i class="fas fa-plus"></i> Create First Task
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Task</h2>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="title">Title <span class="required">*</span></label>
                    <input type="text" id="title" required placeholder="What needs to be done?">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Add some details..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate">
                    </div>
                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <div id="popupOverlay" class="popup-overlay">
        <div class="popup-card">
            <i class="popup-icon fas"></i>
            <div class="popup-title"></div>
            <div class="popup-message"></div>
            <div class="popup-actions"></div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
